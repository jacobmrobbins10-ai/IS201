<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flappy Brave – Atlanta Braves Edition</title>
    <style>
        /* ---- Reset & Base ---- */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@700&display=swap');

        body {
            background: #13274F;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Oswald', 'Arial Black', sans-serif;
            color: #fff;
            overflow: hidden;
        }

        h1 {
            font-size: 2rem;
            letter-spacing: 0.1em;
            color: #EAAA00;
            text-transform: uppercase;
            margin-bottom: 0.3rem;
        }
        .subtitle {
            font-size: 0.9rem;
            color: #aac;
            letter-spacing: 0.15em;
            margin-bottom: 1rem;
        }

        #game-wrapper {
            position: relative;
        }

        canvas {
            display: block;
            border: 3px solid #CE1141;
            border-radius: 6px;
            cursor: pointer;
        }

        /* Overlay for start / game-over */
        #overlay {
            position: absolute;
            inset: 0;
            background: rgba(13,26,48,0.82);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
        }

        #overlay h2 {
            font-size: 2.2rem;
            color: #EAAA00;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            text-align: center;
        }
        #overlay p {
            color: #ccd;
            font-size: 1rem;
            letter-spacing: 0.1em;
            margin: 0.5rem 0 1.5rem;
            text-align: center;
        }
        #overlay .score-display {
            font-size: 3rem;
            color: #fff;
            margin: 0.3rem 0;
        }
        #overlay .best-display {
            font-size: 1rem;
            color: #EAAA00;
            margin-bottom: 1.2rem;
        }
        #overlay button {
            background: #CE1141;
            color: #fff;
            border: none;
            font-family: inherit;
            font-size: 1.1rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            padding: 0.75rem 2.5rem;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.15s, transform 0.1s;
        }
        #overlay button:hover {
            background: #EAAA00;
            color: #13274F;
            transform: scale(1.04);
        }

        #live-score {
            position: absolute;
            top: 12px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 2.2rem;
            color: #fff;
            text-shadow: 0 2px 6px rgba(0,0,0,0.6);
            pointer-events: none;
        }

        .nav-links {
            margin-top: 1rem;
            font-size: 0.85rem;
            letter-spacing: 0.1em;
        }
        .nav-links a {
            color: #EAAA00;
            text-decoration: none;
            margin: 0 0.7rem;
        }
        .nav-links a:hover { text-decoration: underline; }
    </style>
</head>
<body>

<h1>⚾ Flappy Brave</h1>
<p class="subtitle">Atlanta Braves Edition · Tap or press Space</p>

<div id="game-wrapper">
    <canvas id="gameCanvas" width="420" height="580"></canvas>
    <div id="live-score"></div>

    <div id="overlay">
        <h2 id="overlay-title">Flappy Brave</h2>
        <p id="overlay-msg">Dodge the walls. Score big.<br>Tap, click, or press Space to start.</p>
        <div class="score-display" id="overlay-score" style="display:none"></div>
        <div class="best-display" id="overlay-best" style="display:none"></div>
        <button id="startBtn">Play Ball! ⚾</button>
    </div>
</div>

<div class="nav-links">
    <a href="braves.html">← Braves Page</a>
    <a href="index.html">Résumé</a>
</div>

<script>
// ---- Canvas setup ----
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

// ---- Game state ----
let state = 'idle'; // idle | playing | dead
let bird, pipes, frameCount, score, bestScore = 0;

// ---- Constants ----
const GRAVITY    = 0.38;
const FLAP       = -8.5;
const PIPE_W     = 60;
const GAP        = 155;
const PIPE_SPEED = 2.8;
const PIPE_INT   = 90; // frames between pipes
const BIRD_R     = 18; // bird radius (drawn as tomahawk / baseball)

function initGame() {
    bird = { x: 100, y: H / 2, vy: 0, rotation: 0 };
    pipes = [];
    frameCount = 0;
    score = 0;
    document.getElementById('live-score').textContent = '';
}

// ---- Input ----
function flap() {
    if (state === 'playing') {
        bird.vy = FLAP;
    }
}
document.addEventListener('keydown', e => {
    if (e.code === 'Space') { e.preventDefault(); flap(); }
});
canvas.addEventListener('click', flap);
canvas.addEventListener('touchstart', e => { e.preventDefault(); flap(); }, { passive: false });

document.getElementById('startBtn').addEventListener('click', () => {
    document.getElementById('overlay').style.display = 'none';
    initGame();
    state = 'playing';
    requestAnimationFrame(loop);
});

// ---- Drawing helpers ----

// Draw Truist Park stadium background
function drawBackground() {
    // Day sky
    const sky = ctx.createLinearGradient(0, 0, 0, H * 0.6);
    sky.addColorStop(0, '#5ba3d9');
    sky.addColorStop(1, '#a8d4f0');
    ctx.fillStyle = sky;
    ctx.fillRect(0, 0, W, H);

    // Clouds
    ctx.fillStyle = 'rgba(255,255,255,0.85)';
    [[55,55,28],[170,40,38],[320,65,24],[390,45,18]].forEach(([x,y,r]) => {
        ctx.beginPath();
        ctx.arc(x, y, r, 0, Math.PI*2);
        ctx.arc(x+r*0.8, y-r*0.3, r*0.65, 0, Math.PI*2);
        ctx.arc(x-r*0.6, y-r*0.2, r*0.55, 0, Math.PI*2);
        ctx.fill();
    });

    // Left stand
    ctx.fillStyle = '#c8c8c8';
    ctx.beginPath();
    ctx.moveTo(0, H*0.38);
    ctx.lineTo(0, H*0.55);
    ctx.lineTo(W*0.38, H*0.55);
    ctx.lineTo(W*0.42, H*0.38);
    ctx.closePath();
    ctx.fill();
    // Right stand
    ctx.beginPath();
    ctx.moveTo(W, H*0.38);
    ctx.lineTo(W, H*0.55);
    ctx.lineTo(W*0.62, H*0.55);
    ctx.lineTo(W*0.58, H*0.38);
    ctx.closePath();
    ctx.fill();

    // Seat rows left
    ctx.strokeStyle = '#a0a0a0';
    ctx.lineWidth = 1;
    for (let i = 0; i < 6; i++) {
        const t = i / 6;
        ctx.beginPath();
        ctx.moveTo(0, H*0.39 + t*0.16*H);
        ctx.lineTo(W*0.38 - t*0.04*W, H*0.39 + t*0.16*H);
        ctx.stroke();
    }
    // Seat rows right
    for (let i = 0; i < 6; i++) {
        const t = i / 6;
        ctx.beginPath();
        ctx.moveTo(W, H*0.39 + t*0.16*H);
        ctx.lineTo(W*0.62 + t*0.04*W, H*0.39 + t*0.16*H);
        ctx.stroke();
    }

    // Center field batter's eye
    ctx.fillStyle = '#1a3d1a';
    ctx.fillRect(W*0.3, H*0.3, W*0.4, H*0.28);

    // Outfield wall
    ctx.fillStyle = '#2d6b2d';
    ctx.beginPath();
    ctx.moveTo(0, H*0.56);
    ctx.quadraticCurveTo(W*0.5, H*0.42, W, H*0.56);
    ctx.lineTo(W, H*0.62);
    ctx.quadraticCurveTo(W*0.5, H*0.48, 0, H*0.62);
    ctx.closePath();
    ctx.fill();

    // Warning track
    ctx.fillStyle = '#c8a060';
    ctx.beginPath();
    ctx.moveTo(0, H*0.6);
    ctx.quadraticCurveTo(W*0.5, H*0.47, W, H*0.6);
    ctx.lineTo(W, H*0.65);
    ctx.quadraticCurveTo(W*0.5, H*0.52, 0, H*0.65);
    ctx.closePath();
    ctx.fill();

    // Outfield grass
    ctx.fillStyle = '#3a8a3a';
    ctx.beginPath();
    ctx.moveTo(0, H*0.63);
    ctx.quadraticCurveTo(W*0.5, H*0.51, W, H*0.63);
    ctx.lineTo(W, H*0.75);
    ctx.lineTo(0, H*0.75);
    ctx.closePath();
    ctx.fill();

    // Infield dirt
    ctx.fillStyle = '#c8a060';
    ctx.beginPath();
    ctx.arc(W*0.5, H*0.85, W*0.32, Math.PI, 0);
    ctx.closePath();
    ctx.fill();

    // Infield grass diamond
    ctx.fillStyle = '#4aaa4a';
    ctx.beginPath();
    ctx.moveTo(W*0.5, H*0.68);
    ctx.lineTo(W*0.62, H*0.78);
    ctx.lineTo(W*0.5, H*0.88);
    ctx.lineTo(W*0.38, H*0.78);
    ctx.closePath();
    ctx.fill();

    // Pitcher's mound
    ctx.fillStyle = '#b89050';
    ctx.beginPath();
    ctx.ellipse(W*0.5, H*0.78, 14, 8, 0, 0, Math.PI*2);
    ctx.fill();

    // Bases
    ctx.fillStyle = '#ffffff';
    [[W*0.5,H*0.688],[W*0.624,H*0.778],[W*0.5,H*0.868],[W*0.376,H*0.778]].forEach(([bx,by]) => {
        ctx.save();
        ctx.translate(bx, by);
        ctx.rotate(Math.PI/4);
        ctx.fillRect(-5, -5, 10, 10);
        ctx.restore();
    });

    // Ground
    ctx.fillStyle = '#c8a060';
    ctx.fillRect(0, H*0.85, W, H*0.15);

    // Foul lines
    ctx.strokeStyle = 'rgba(255,255,255,0.6)';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(W*0.376, H*0.778);
    ctx.lineTo(0, H*0.62);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(W*0.624, H*0.778);
    ctx.lineTo(W, H*0.62);
    ctx.stroke();
}

// Draw baseball bats as obstacles
function drawPipe(x, topH, botY) {
    const batW = 14;   // barrel width
    const handleW = 7;
    const knobW = 11;
    const cx = x + PIPE_W / 2; // center x of the pipe slot

    // ---- TOP BAT (pointing down, knob at top, barrel at bottom) ----
    ctx.save();
    // Knob
    ctx.fillStyle = '#f5e6c8';
    ctx.beginPath();
    ctx.ellipse(cx, 6, knobW/2, 5, 0, 0, Math.PI*2);
    ctx.fill();
    // Handle
    const handleLen = Math.max(0, topH - 30);
    ctx.fillStyle = '#d4a055';
    ctx.fillRect(cx - handleW/2, 10, handleW, handleLen);
    // Barrel taper
    const taperStart = 10 + handleLen;
    ctx.beginPath();
    ctx.moveTo(cx - handleW/2, taperStart);
    ctx.lineTo(cx - batW/2, taperStart + 12);
    ctx.lineTo(cx - batW/2, topH);
    ctx.lineTo(cx + batW/2, topH);
    ctx.lineTo(cx + batW/2, taperStart + 12);
    ctx.lineTo(cx + handleW/2, taperStart);
    ctx.closePath();
    ctx.fillStyle = '#c8903a';
    ctx.fill();
    // Wood grain lines on barrel
    ctx.strokeStyle = 'rgba(0,0,0,0.15)';
    ctx.lineWidth = 1;
    for (let g = 0; g < 3; g++) {
        ctx.beginPath();
        ctx.moveTo(cx - batW/2 + 3 + g*3, taperStart + 14);
        ctx.lineTo(cx - batW/2 + 3 + g*3, topH - 2);
        ctx.stroke();
    }
    // Barrel end cap
    ctx.fillStyle = '#b07828';
    ctx.beginPath();
    ctx.ellipse(cx, topH, batW/2, 4, 0, 0, Math.PI*2);
    ctx.fill();
    // Tape on handle
    ctx.fillStyle = '#222222';
    ctx.fillRect(cx - handleW/2 - 1, 12, handleW + 2, 16);
    ctx.restore();

    // ---- BOTTOM BAT (pointing up, knob at bottom, barrel at top) ----
    ctx.save();
    const botEnd = H - 40; // ground
    const batTotalH = botEnd - botY;
    // Barrel at top
    ctx.fillStyle = '#c8903a';
    ctx.beginPath();
    ctx.ellipse(cx, botY, batW/2, 4, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.fillRect(cx - batW/2, botY, batW, Math.min(20, batTotalH));
    // Taper into handle
    const taperEnd = botY + Math.min(20, batTotalH);
    const handleStart = taperEnd + 10;
    if (handleStart < botEnd - 20) {
        ctx.beginPath();
        ctx.moveTo(cx - batW/2, taperEnd);
        ctx.lineTo(cx - handleW/2, handleStart);
        ctx.lineTo(cx - handleW/2, botEnd - 14);
        ctx.lineTo(cx + handleW/2, botEnd - 14);
        ctx.lineTo(cx + handleW/2, handleStart);
        ctx.lineTo(cx + batW/2, taperEnd);
        ctx.closePath();
        ctx.fillStyle = '#d4a055';
        ctx.fill();
        // Wood grain
        ctx.strokeStyle = 'rgba(0,0,0,0.12)';
        ctx.lineWidth = 1;
        for (let g = 0; g < 3; g++) {
            ctx.beginPath();
            ctx.moveTo(cx - batW/2 + 3 + g*3, botY + 2);
            ctx.lineTo(cx - batW/2 + 3 + g*3, taperEnd - 2);
            ctx.stroke();
        }
        // Tape
        ctx.fillStyle = '#222222';
        ctx.fillRect(cx - handleW/2 - 1, botEnd - 30, handleW + 2, 16);
        // Knob
        ctx.fillStyle = '#f5e6c8';
        ctx.beginPath();
        ctx.ellipse(cx, botEnd - 10, knobW/2, 5, 0, 0, Math.PI*2);
        ctx.fill();
    }
    ctx.restore();
}

// Draw baseball as bird
function drawBird(x, y, rot) {
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(rot);

    // Ball shadow
    ctx.fillStyle = 'rgba(0,0,0,0.2)';
    ctx.beginPath();
    ctx.ellipse(3, 4, BIRD_R, BIRD_R * 0.7, 0, 0, Math.PI * 2);
    ctx.fill();

    // Ball body
    ctx.fillStyle = '#ffffff';
    ctx.beginPath();
    ctx.arc(0, 0, BIRD_R, 0, Math.PI * 2);
    ctx.fill();

    // Ball seams (red stitching)
    ctx.strokeStyle = '#CE1141';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(-4, 0, 10, -0.8, 0.8);
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(4, 0, 10, Math.PI - 0.8, Math.PI + 0.8);
    ctx.stroke();

    // Braves-style script "A" drawn with canvas paths
    const s = BIRD_R / 18; // scale factor
    ctx.save();
    ctx.scale(s, s);
    // Navy fill with red outline — mimics the Braves cap logo
    ctx.strokeStyle = '#CE1141';
    ctx.lineWidth = 1.5 / s;
    ctx.fillStyle = '#13274F';
    ctx.beginPath();
    // Left leg of A
    ctx.moveTo(-9, 9);
    ctx.bezierCurveTo(-8, 4, -5, -2, 0, -10);
    // Right leg of A
    ctx.bezierCurveTo(5, -2, 8, 4, 9, 9);
    // Right serif foot
    ctx.lineTo(11, 9);
    ctx.lineTo(9, 9);
    // Inner right
    ctx.bezierCurveTo(7, 3, 4, -1, 0, -7);
    // Inner left
    ctx.bezierCurveTo(-4, -1, -7, 3, -9, 9);
    ctx.lineTo(-11, 9);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
    // Crossbar
    ctx.beginPath();
    ctx.moveTo(-4, 2);
    ctx.bezierCurveTo(-2, 0, 2, 0, 4, 2);
    ctx.lineWidth = 2 / s;
    ctx.strokeStyle = '#CE1141';
    ctx.stroke();
    ctx.restore();

    ctx.restore();
}

// ---- Collision ----
function checkCollision() {
    const bx = bird.x, by = bird.y;
    // Ground / ceiling
    if (by + BIRD_R >= H - 40 || by - BIRD_R <= 0) return true;
    // Pipes — collision uses bat barrel width (14px), centered in PIPE_W slot
    const batHalf = 9;
    for (const p of pipes) {
        const pcx = p.x + PIPE_W / 2;
        if (bx + BIRD_R > pcx - batHalf && bx - BIRD_R < pcx + batHalf) {
            if (by - BIRD_R < p.topH || by + BIRD_R > p.botY) return true;
        }
    }
    return false;
}

// ---- Game loop ----
function loop() {
    if (state !== 'playing') return;

    frameCount++;

    // Bird physics
    bird.vy += GRAVITY;
    bird.y  += bird.vy;
    bird.rotation = Math.min(Math.max(bird.vy * 0.06, -0.5), 1.0);

    // Spawn pipes
    if (frameCount % PIPE_INT === 0) {
        const topH = 60 + Math.random() * (H - GAP - 140);
        pipes.push({ x: W, topH, botY: topH + GAP, passed: false });
    }

    // Move pipes & score
    for (const p of pipes) {
        p.x -= PIPE_SPEED;
        if (!p.passed && p.x + PIPE_W < bird.x) {
            p.passed = true;
            score++;
            document.getElementById('live-score').textContent = score;
        }
    }
    pipes = pipes.filter(p => p.x + PIPE_W > -10);

    // Collision
    if (checkCollision()) {
        state = 'dead';
        if (score > bestScore) bestScore = score;
        showGameOver();
        return;
    }

    // Draw
    drawBackground();
    pipes.forEach(p => drawPipe(p.x, p.topH, p.botY));
    drawBird(bird.x, bird.y, bird.rotation);

    requestAnimationFrame(loop);
}

function showGameOver() {
    const ov = document.getElementById('overlay');
    const medals = score >= 30 ? '🏆 WORLD CHAMPS!' : score >= 15 ? '🥈 Postseason Bound' : score >= 5 ? '⚾ Good At-Bat' : '😬 Ouch...';
    document.getElementById('overlay-title').textContent = 'Game Over';
    document.getElementById('overlay-msg').textContent = medals;
    document.getElementById('overlay-score').textContent = score;
    document.getElementById('overlay-score').style.display = 'block';
    document.getElementById('overlay-best').textContent = `Best: ${bestScore}`;
    document.getElementById('overlay-best').style.display = 'block';
    document.getElementById('startBtn').textContent = 'Try Again ⚾';
    ov.style.display = 'flex';
}

// ---- Initial static draw ----
drawBackground();
drawBird(100, H/2, 0);
</script>
</body>
</html>
